services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: decisiolens-backend:latest
    restart: unless-stopped
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}

      AUDIT_API_KEY: ${AUDIT_API_KEY:?Set AUDIT_API_KEY in .env}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-false}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000"]}'
      ALLOWED_HOSTS: '${ALLOWED_HOSTS:-["localhost","127.0.0.1","backend"]}'
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-131072}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      CACHE_MAX_SIZE: ${CACHE_MAX_SIZE:-256}
      AI_CALL_TIMEOUT_SECONDS: ${AI_CALL_TIMEOUT_SECONDS:-10}
      WEB_CONCURRENCY: ${BACKEND_WEB_CONCURRENCY:-2}
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    image: decisiolens-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      PORT: 3000
      HOSTNAME: 0.0.0.0
      BACKEND_API_BASE: ${BACKEND_API_BASE:-http://backend:8000}
      AUDIT_API_KEY: ${AUDIT_API_KEY:?Set AUDIT_API_KEY in .env}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
